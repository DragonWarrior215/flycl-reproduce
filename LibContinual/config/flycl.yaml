# Fly-CL (ICLR 2026) on CIFAR-100, B0 10x10 class-incremental protocol.
# Re-implemented in LibContinual (NOT the authors' repo). See core/model/flycl.py.
# Hyperparameters follow the official scripts/test_cifar.sh:
#   M=10000, synaptic_degree=300, coding_level=0.3, seed=1993, ridge in [1e6,1e10].

init_cls_num: &init_cls_num 10
inc_cls_num: &inc_cls_num 10
total_cls_num: &total_cls_num 100
task_num: &task_num 10
image_size: &image_size 224

task_num: *task_num
init_cls_num: *init_cls_num
inc_cls_num: *inc_cls_num
total_cls_num: *total_cls_num

# Fly-CL has no gradient training: 1 epoch just streams data through observe()
# to accumulate G,Q; the closed-form solve happens in after_task().
init_epoch: 1
epoch: 1
batch_size: 128
val_per_epoch: 1

seed: 1993

# Dataset: our CIFAR-100 is in the standard cifar-100-python pickle format.
dataset: binary_cifar100
data_root: ./data          # contains data/cifar-100-python/{train,test}
setting: task-agnostic     # class-incremental (no task id at inference)
testing_times: 1          # deterministic closed-form -> repeated eval is redundant
testing_per_task: True
num_workers: 8

# Fly-CL CIFAR preprocessing: Resize(224, BICUBIC) + CenterCrop(224) + Normalize(0.5).
train_trfms:
  - Resize:
      size: *image_size
      interpolation: BICUBIC
  - CenterCrop:
      size: *image_size
  - ToTensor: {}
  - Normalize:
      mean: [0.5, 0.5, 0.5]
      std: [0.5, 0.5, 0.5]

test_trfms:
  - Resize:
      size: *image_size
      interpolation: BICUBIC
  - CenterCrop:
      size: *image_size
  - ToTensor: {}
  - Normalize:
      mean: [0.5, 0.5, 0.5]
      std: [0.5, 0.5, 0.5]

# No real optimizer is used (frozen backbone + closed-form head). Kept minimal
# so Trainer's loss.backward()/optimizer.step() are harmless no-ops.
optimizer:
  name: SGD
  kwargs:
    lr: 0.0

lr_scheduler:
  name: Constant

buffer:
  name: LinearBuffer
  kwargs:
    buffer_size: 0
    batch_size: 128
    strategy: random

backbone:
  name: vit_flycl
  kwargs:
    pretrained: true
    # Paper's IN21k augreg ViT-B/16 (the .npz from Fly-CL's pretrained_model/download.sh).
    # For the IN-1k backbone ablation use ./assets/vit_b_16_torchvision.pth instead (see README §5).
    weights_path: ./assets/vit_b16_augreg_in21k.npz
    model_name: vit_base_patch16_224

classifier:
  name: FlyCL
  kwargs:
    embedding_dim: 768
    expand_dim: 10000        # M
    synaptic_degree: 300     # s non-zeros per KC row
    coding_level: 0.3        # WTA keep ratio rho
    ridge_lower: 6           # log10
    ridge_upper: 10
    seed: 1993
    init_cls_num: *init_cls_num
    inc_cls_num: *inc_cls_num
    task_num: *task_num
    total_cls_num: *total_cls_num
